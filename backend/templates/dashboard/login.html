{% extends "dashboard/base.html" %}

{% block title %}Admin Login{% endblock %}

{% block body %}
  <main class="login-shell">
    <section class="login-card">
      <p class="eyebrow">Tech Access Admin</p>
      <h1>Sign in to dashboard</h1>
      <p class="muted">Protected workspace for reviewing and managing submissions.</p>
      {% if form.errors %}
        <div class="alert error">Invalid username or password.</div>
      {% endif %}
      <form method="post" class="stack">
        {% csrf_token %}
        <label>
          {{ form.username.label }}
          {{ form.username }}
        </label>
        <label>
          {{ form.password.label }}
          {{ form.password }}
        </label>
        <button type="submit">Sign in</button>
      </form>
    </section>
  </main>
{% endblock %}
